name: Aggregator Auto Run

on:
  schedule:
    # 每 3 小时跑一次：00 03 06 09 12 15 18 21 (UTC+8)
    # 对应 UTC: 16 19 22 01 04 07 10 13
    - cron: '0 16,19,22,1,4,7,10,13 * * *'
  workflow_dispatch:

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - run: |
          pip install -r requirements.txt pyyaml

      - name: Download clash
        run: |
          mkdir -p clash
          curl -sL -o clash/clash-linux-amd https://github.com/wzdnzd/aggregator/raw/main/clash/clash-linux-amd
          chmod +x clash/clash-linux-amd

      - name: Run
        env:
          PUSH_TOKEN: ${{ secrets.PUSH_TOKEN }}
        run: python subscribe/process.py -s my-config.json -r 3 -t 5000

      - uses: actions/upload-artifact@v4
        with:
          name: node-output
          path: output/
          retention-days: 7
