name: Aggregator Auto Run

on:
  schedule:
    - cron: '0 22,4,10,16 * * *'
  workflow_dispatch:

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download clash binary
        run: |
          mkdir -p clash data
          curl -sL -o clash/clash-linux-amd \
            https://github.com/wzdnzd/aggregator/raw/main/clash/clash-linux-amd
          chmod +x clash/clash-linux-amd
          curl -sL -o data/Country.mmdb \
            https://github.com/wzdnzd/aggregator/raw/main/clash/Country.mmdb

      - name: Run aggregator
        env:
          PUSH_TOKEN: ${{ secrets.PUSH_TOKEN }}
        run: |
          python subscribe/process.py -s my-config.json -r 3 -t 8000

      - name: Upload output artifacts
        uses: actions/upload-artifact@v4
        with:
          name: node-output
          path: output/
          retention-days: 7
